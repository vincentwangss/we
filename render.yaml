services:
  - type: web
    name: digital-couple
    env: node
    buildCommand: npm install --registry=https://registry.npmmirror.com/
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # AI API Keys
      - key: DEEPSEEK_API_KEY
        sync: false
      # Supabase PostgreSQL Database (连接池)
      - key: DATABASE_URL
        sync: false
      # Supabase Project URL
      - key: SUPABASE_URL
        value: https://yejnhevfcumszhybpsqk.supabase.co
      # Session Secret
      - key: SESSION_SECRET
        generateValue: true
      # Chat Passwords
      - key: HUSBAND_PWD
        value: lovesyq
      - key: WIFE_PWD
        value: lovewss
      # GPT-SoVITS (可选，本地语音合成)
      - key: GPT_SOVITS_API
        value: http://127.0.0.1:9880
