        - generic [ref=e145]: “今年‘五一’，持股过节是比较不错的选项。一方面，从中长期看，这轮牛市远没有结束。另一方面从短期角度看，4月份以来的反弹，整体上还有继续往上的空间。”4月29日，兴业证券经济与金融研究院院长助理、首席策略分析师张启尧做客澎湃新闻《首席连线》节目时表示。张启尧表示，目前不论是经济还是企业盈利，修复的趋势都在继续，这对于5月的行情是比较有利的。“外部方面，不论是从资金角度，还是从全球出口份额角度，中国资产也是众望所归的一个选择，对中国资产应该更有自信一点。”配置上，张启尧认为，市场整体并没有太大的风险，但可以进行结构性的均衡。即从拥挤度高的板块中，去向拥挤度不太高、而且是业绩比较好的方向进行分散或轮动，这是当前比较好的一个策略选择。“行业上，二季度更偏向科技，AI和出海是重中之重。下半年投资机会会更加扩散和全面，存在向地产、消费等低位板块轮动的可能。”张启尧说。
